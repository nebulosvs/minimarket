spring.application.name=minimarket
# Configuracion de H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# Configuracion de JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT configuration
app.jwt.secret=V2lFTHVIT2VjYzVvVUpjQ2hjNjNLMmVzeHBJQ1p3U0M=
app.jwt.expiration-ms=3600000

server.port=8081

# Seguridad LDAP (servidor embebido para desarrollo)
app.security.ldap.enabled=true

# IDaaS / OAuth2 (deshabilitado por defecto; ver application-oauth2.example.properties)
app.security.oauth2.client.enabled=false
app.security.oauth2.resource-server.enabled=false
app.security.oauth2.registration-id=idaas
app.security.oauth2.issuer-uri=
app.security.oauth2.success-redirect=http://localhost:3000/auth/callback